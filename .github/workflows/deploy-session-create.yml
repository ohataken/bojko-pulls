name: Deploy bojko_pulls_session_create

on:
  push:
    branches:
      - main
    paths:
      - 'bojko_pulls_session_create/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::787309524765:role/bojko-pulls-github-actions-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false
      - run: |
          cd bojko_pulls_session_create
          bundle config set --local path 'vendor/bundle'
          bundle install
      - run: cd bojko_pulls_session_create && zip -r ../bojko_pulls_session_create.zip .
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws lambda update-function-code \
            --function-name bojko-pulls-session-create \
            --zip-file fileb://bojko_pulls_session_create.zip
