name: Deploy bojko_pulls_session_create

on:
  push:
    branches:
      - main
    paths:
      - 'bojko_pulls_session_create/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false
      - run: cd bojko_pulls_session_create && bundle config set --local path 'vendor/bundle' && bundle install
      - run: cd bojko_pulls_session_create && zip -r ../bojko_pulls_session_create.zip .
