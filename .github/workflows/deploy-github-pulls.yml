name: Deploy bojko_pulls_github_pulls

on:
  push:
    branches:
      - main
    paths:
      - 'bojko_pulls_github_pulls/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false
      - run: cd bojko_pulls_github_pulls && bundle config set --local path 'vendor/bundle' && bundle install
      - run: cd bojko_pulls_github_pulls && zip -r ../bojko_pulls_github_pulls.zip .
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
