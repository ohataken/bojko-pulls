name: Deploy bojko_pulls_session_complete

on:
  push:
    branches:
      - main
    paths:
      - 'bojko_pulls_session_complete/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false
      - run: cd bojko_pulls_session_complete && bundle install --path vendor/bundle
