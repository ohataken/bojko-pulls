name: Deploy bojko_pulls_session_complete

on:
  push:
    branches:
      - main
    paths:
      - 'bojko_pulls_session_complete/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::787309524765:role/bojko-pulls-github-actions-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false
      - run: |
          cd bojko_pulls_session_complete
          bundle config set --local path 'vendor/bundle'
          bundle config set --local without development
          bundle install
      - run: cd bojko_pulls_session_complete && zip -r ../bojko_pulls_session_complete.zip .
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws lambda update-function-code \
            --function-name bojko-pulls-session-complete \
            --zip-file fileb://bojko_pulls_session_complete.zip
